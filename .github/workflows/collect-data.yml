# Daily: Reddit, NewsAPI, X/Twitter -> FinBERT -> SQLite (data/db/sentiments.db).
# Secrets: REDDIT_CLIENT_ID, REDDIT_CLIENT_SECRET, REDDIT_USER_AGENT, NEWS_API_KEY, TWITTER_BEARER_TOKEN

name: Daily sentiment ingestion

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sentiment-ingest-${{ github.ref }}
  cancel-in-progress: false

env:
  PYTHONPATH: ${{ github.workspace }}/backend

jobs:
  collect-and-store:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Cache FinBERT / Hugging Face
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: huggingface-${{ runner.os }}-finbert-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            huggingface-${{ runner.os }}-finbert-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir -r backend/requirements.txt

      - name: Ensure database directory exists
        run: mkdir -p data/db

      - name: Reddit to sentiment to DB
        env:
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          REDDIT_USER_AGENT: ${{ secrets.REDDIT_USER_AGENT }}
        run: python -m app.pipelines.ingest_reddit --time-filter day --limit 120 --store-db --no-write-files
        continue-on-error: true

      - name: News to sentiment to DB
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python -m app.pipelines.ingest_news --days-back 1 --max-articles 100 --store-db --no-write-files
        continue-on-error: true

      - name: X/Twitter to sentiment to DB
        env:
          TWITTER_BEARER_TOKEN: ${{ secrets.TWITTER_BEARER_TOKEN }}
        run: |
          if [ -z "${TWITTER_BEARER_TOKEN:-}" ]; then
            echo "Skipping Twitter ingest (TWITTER_BEARER_TOKEN not configured)."
            exit 0
          fi
          python -m app.pipelines.ingest_twitter --max-tweets 80 --store-db --no-write-files

      - name: Commit and push sentiments.db
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ ! -f data/db/sentiments.db ]; then
            echo "::error::data/db/sentiments.db missing after ingest steps"
            exit 1
          fi
          ROWS="$(python -c "import sqlite3; c=sqlite3.connect('data/db/sentiments.db').cursor(); print(c.execute('SELECT COUNT(*) FROM sentiment_records').fetchone()[0])")"
          echo "sentiment_records row count after ingest: ${ROWS}"
          git add data/db/sentiments.db
          if git diff --staged --quiet; then
            echo "No database file change vs HEAD (duplicate run or INSERT OR IGNORE skipped all rows)."
          else
            git diff --staged --stat
            git commit -m "chore(data): daily sentiment ingest $(date -u +'%Y-%m-%d %H:%M UTC') (rows=${ROWS})"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push origin "${GITHUB_REF_NAME}"
          fi

      - name: Summary
        if: always()
        run: |
          {
            echo "## Daily sentiment ingest"
            echo ""
            echo "- Runner time (UTC): $(date -u)"
            echo "- Branch: ${GITHUB_REF_NAME}"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"
          if [ -f data/db/sentiments.db ]; then
            echo "### sentiments.db" >> "$GITHUB_STEP_SUMMARY"
            ls -lh data/db/sentiments.db >> "$GITHUB_STEP_SUMMARY"
            python -c "import sqlite3; c=sqlite3.connect('data/db/sentiments.db').cursor(); c.execute('SELECT COUNT(*) FROM sentiment_records'); print('- rows:', c.fetchone()[0])" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "_No sentiments.db_" >> "$GITHUB_STEP_SUMMARY"
          fi
